schemaVersion: "1"
kind: agent
name: pi
displayName: Pi
description: Terminal AI coding agent backed by a local oMLX model server

agent:
  image: "pi-sandbox:latest"
  entrypoint:
    run: ["/usr/local/bin/pi-start.sh"]

# oMLX serves its OpenAI-compatible API on the host at port 8000 (default).
# Inside the sandbox, the host is reachable via host.docker.internal.
network:
  allowedDomains:
    - "host.docker.internal:8000"
    - "github.com:443"
    - "*.github.com:443"
    - "*.githubusercontent.com:443"
    - "registry.npmjs.org:443"
    - "*.npmjs.com:443"
    - "pypi.org:443"
    - "files.pythonhosted.org:443"
  serviceDomains:
    api.github.com: github
    registry.npmjs.org: npm
  serviceAuth:
    github:
      headerName: Authorization
      valueFormat: "Bearer %s"
    npm:
      headerName: Authorization
      valueFormat: "Bearer %s"

# GITHUB_PERSONAL_ACCESS_TOKEN and NPM_TOKEN must be set in your host environment.
# oMLX API key: enable "skip API key verification" in the oMLX admin panel
# (global settings). The sbx proxy routes container traffic through its own
# localhost, so oMLX sees the connection as 127.0.0.1 and honours the setting.
# Open network policy is required so the proxy can reach the host:
#   sbx policy set-default open
credentials:
  sources:
    github:
      env:
        - GITHUB_PERSONAL_ACCESS_TOKEN
    npm:
      env:
        - NPM_TOKEN

environment:
  variables:
    OMLX_MODEL: "Qwen3.6-35B-A3B-MLX-8bit"
    OMLX_PORT: "8000"
